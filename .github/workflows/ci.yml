name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version:
          - "3.10"
          - "3.14"

    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          version: "0.11.19"
          enable-cache: true

      - name: Check lockfile
        run: uv lock --check

      - name: Install locked dependencies
        run: uv sync --locked --python "${{ matrix.python-version }}"

      - name: Run tests
        run: uv run --locked --python "${{ matrix.python-version }}" pytest -q

      - name: Build package
        if: matrix.python-version == '3.14'
        run: uv build

      - name: Verify built wheel
        if: matrix.python-version == '3.14'
        run: |
          wheel="$(find dist -name '*.whl' -print -quit)"
          uv run --isolated --no-project --with "$wheel" python -c \
            'from stockholm_freja import freja_login; assert callable(freja_login)'
